<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Masjid Al Aqobah 7</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Rich Text Editor (Quill.js) -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <!-- Admin CSS -->
    <link rel="stylesheet" href="admin.css">
</head>
<body class="dashboard-body">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i data-lucide="tent" class="sidebar-logo-icon"></i>
            <span class="sidebar-title">Al Aqobah 7 Admin</span>
        </div>
        
        <div class="sidebar-profile">
            <div class="avatar">A7</div>
            <div class="profile-info">
                <p class="profile-name">Admin</p>
                <span class="profile-badge">Administrator</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="#dashboard" class="nav-link active" data-page="dashboard">
                        <i data-lucide="layout-dashboard"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#beranda" class="nav-link" data-page="beranda">
                        <i data-lucide="globe"></i> Beranda & Visi Misi
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#layanan" class="nav-link" data-page="layanan">
                        <i data-lucide="heart-handshake"></i> Layanan Masyarakat
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#berita" class="nav-link" data-page="berita">
                        <i data-lucide="newspaper"></i> Berita
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#kegiatan" class="nav-link" data-page="kegiatan">
                        <i data-lucide="calendar-days"></i> Kegiatan Masjid
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#komentar" class="nav-link" data-page="komentar">
                        <i data-lucide="message-square"></i> Komentar Publik
                        <span id="komentarBadge" style="display:none; background:var(--accent-gold); color:#000; font-size:10px; font-weight:700; padding:1px 6px; border-radius:50px; margin-left:auto;">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#kritik-saran" class="nav-link" data-page="kritik-saran">
                        <i data-lucide="mail"></i> Kritik &amp; Saran
                        <span id="kritikBadge" style="display:none; background:#e53e3e; color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:50px; margin-left:auto;">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#donasi-verifikasi" class="nav-link" data-page="donasi-verifikasi">
                        <i data-lucide="check-square"></i> Verifikasi Donasi
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#donasi-program" class="nav-link" data-page="donasi-program">
                        <i data-lucide="layout-grid"></i> Kelola Program Donasi
                    </a>
                </li>
            </ul>

            <div class="nav-divider"></div>

            <ul class="nav-list bottom-nav">
                <li class="nav-item">
                    <a href="#pengaturan" class="nav-link" data-page="pengaturan">
                        <i data-lucide="settings"></i> Pengaturan Umum
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link text-danger" id="logoutBtn">
                        <i data-lucide="log-out"></i> Logout
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="btn-icon mobile-menu-btn" id="mobileMenuBtn">
                    <i data-lucide="menu"></i>
                </button>
                <div class="page-header-info">
                    <h2 class="page-title" id="pageTitle">Dashboard</h2>
                    <nav class="breadcrumb">
                        <span>Dashboard</span> <i data-lucide="chevron-right" class="breadcrumb-icon"></i> <span class="current-page-crumb" id="breadcrumbCurrent">Ringkasan</span>
                    </nav>
                </div>
            </div>
            
            <div class="topbar-right">
                <button class="btn-icon">
                    <i data-lucide="bell"></i>
                </button>
                <div class="topbar-profile">
                    <div class="avatar-small">A7</div>
                </div>
            </div>
        </header>

        <!-- Dynamic Page Content Container -->
        <div class="content-container" id="contentContainer">
            <!-- Content will be loaded here by JS depending on navigation -->
        </div>

    </main>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Scripts -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/supabase-db.js"></script>
    <script src="../js/supabase-storage.js"></script>

    <script src="admin.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
